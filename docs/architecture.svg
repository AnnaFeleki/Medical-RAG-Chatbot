<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="1000" height="300" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Medical RAG Chatbot — Pipeline</text>

  <!-- Indexing row -->
  <text x="40" y="88" font-size="13" font-weight="700" fill="#6b7280">INDEXING</text>
  <g>
    <rect x="40" y="98" width="150" height="60" rx="10" fill="#eef2ff" stroke="#6366f1"/>
    <text x="115" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#3730a3">PDF documents</text>
    <text x="115" y="144" text-anchor="middle" font-size="11" fill="#6b7280">guidelines / papers</text>

    <rect x="230" y="98" width="150" height="60" rx="10" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="305" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#0e7490">Chunk</text>
    <text x="305" y="140" text-anchor="middle" font-size="11" fill="#6b7280">1000 chars, overlap</text>

    <rect x="420" y="98" width="150" height="60" rx="10" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="495" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#0e7490">Embed</text>
    <text x="495" y="140" text-anchor="middle" font-size="11" fill="#6b7280">Ollama / OpenAI</text>

    <rect x="610" y="98" width="170" height="60" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="695" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#15803d">Chroma store</text>
    <text x="695" y="140" text-anchor="middle" font-size="11" fill="#6b7280">reset per index run</text>

    <path d="M190 128 H230" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
    <path d="M380 128 H420" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
    <path d="M570 128 H610" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
  </g>

  <!-- Query row -->
  <text x="40" y="210" font-size="13" font-weight="700" fill="#6b7280">QUERY</text>
  <g>
    <rect x="40" y="220" width="150" height="60" rx="10" fill="#fef2f2" stroke="#ef4444"/>
    <text x="115" y="255" text-anchor="middle" font-size="14" font-weight="600" fill="#b91c1c">User question</text>

    <rect x="420" y="220" width="150" height="60" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="495" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#15803d">Retrieve top-k</text>
    <text x="495" y="263" text-anchor="middle" font-size="11" fill="#6b7280">similarity search</text>

    <rect x="610" y="220" width="170" height="60" rx="10" fill="#fffbeb" stroke="#f59e0b"/>
    <text x="695" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#b45309">LLM (grounded)</text>
    <text x="695" y="263" text-anchor="middle" font-size="11" fill="#6b7280">context-only prompt</text>

    <rect x="820" y="220" width="160" height="60" rx="10" fill="#eef2ff" stroke="#6366f1"/>
    <text x="900" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#3730a3">Cited answer</text>
    <text x="900" y="263" text-anchor="middle" font-size="11" fill="#6b7280">[file, p. N]</text>

    <path d="M190 250 H420" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
    <path d="M695 158 V220" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
    <path d="M570 250 H610" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
    <path d="M780 250 H820" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
  </g>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>
</svg>
